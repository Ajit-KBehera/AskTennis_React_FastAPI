version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DB_TYPE=duckdb
      - DB_PATH=duckdb:///data/tennis_data_with_mcp.db
      - ALLOWED_ORIGINS=http://localhost:80,http://localhost:3000
      # Secrets should be passed via env file or secrets manager
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - API_SECRET_KEY=${API_SECRET_KEY}
    volumes:
      # Persist DuckDB data
      - tennis_data:/app/data
      # Mount source code for development (optional, remove in prod)
      # - ./backend:/app
    depends_on:
      - redis
    networks:
      - asktennis-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      # Dev mode: "3000:3000" if using vite dev server directly
    environment:
      - VITE_API_URL=http://localhost:8000/api
      # This needs to be available at build time for Vite
      # But standard Dockerfile builds static assets, so env vars must be build args or injected at runtime
      # For dev, we might override command to run vite
      # command: npm run dev
      # volumes:
      #   - ./frontend:/app
      #   - /app/node_modules
    networks:
      - asktennis-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asktennis-network

volumes:
  tennis_data:
  redis_data:


networks:
  asktennis-network:
    driver: bridge
