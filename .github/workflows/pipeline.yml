name: Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # 1. Detect Changes
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'README.md'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'README.md'

  # 2. Backend Pipeline
  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx
      - name: Test with pytest
        env:
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: "mock-key"
        run: python3 -m pytest

  deploy-backend:
    needs: [changes, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: us-central1
      SERVICE_NAME: asktennis-backend
      ARTIFACT_REGISTRY_REPO: asktennis
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and Push
        working-directory: ./backend
        run: |
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}"
          IMAGE_TAG="${IMAGE_NAME}:${{ github.sha }}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"
          docker build -t ${IMAGE_TAG} -t ${IMAGE_LATEST} .
          docker push ${IMAGE_TAG}
          docker push ${IMAGE_LATEST}
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --cpu 2 \
            --memory 2Gi \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --port 8000 \
            --set-env-vars "ENVIRONMENT=production" \
            --set-env-vars "ALLOW_ALL_ORIGINS=true" \
            --set-env-vars "DB_TYPE=cloudsql" \
            --set-env-vars "INSTANCE_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --set-env-vars "TENNIS_DB_NAME=${{ secrets.TENNIS_DB_NAME }}" \
            --set-env-vars "TENNIS_DB_USER=${{ secrets.TENNIS_DB_USER }}" \
            --set-env-vars "AUTH_DB_NAME=${{ secrets.AUTH_DB_NAME }}" \
            --set-env-vars "AUTH_DB_USER=${{ secrets.AUTH_DB_USER }}" \
            --set-env-vars "RATE_LIMIT_PER_MINUTE=30" \
            --set-env-vars "QUERY_RATE_LIMIT_PER_MINUTE=10" \
            --set-secrets "GOOGLE_API_KEY=GOOGLE_API_KEY:latest" \
            --set-secrets "JWT_SECRET_KEY=JWT_SECRET_KEY:latest" \
            --set-secrets "TENNIS_DB_PASSWORD=TENNIS_DB_PASSWORD:latest" \
            --set-secrets "AUTH_DB_PASSWORD=AUTH_DB_PASSWORD:latest" \
            --add-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}

  # 3. Frontend Pipeline
  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm run test:run

  deploy-frontend:
    needs: [changes, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: us-central1
      SERVICE_NAME: asktennis-frontend
      ARTIFACT_REGISTRY_REPO: asktennis
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      - name: Build and Push
        working-directory: ./frontend
        run: |
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}"
          IMAGE_TAG="${IMAGE_NAME}:${{ github.sha }}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"
          docker build \
            --build-arg VITE_API_URL=${{ secrets.BACKEND_URL }}/api \
            -t ${IMAGE_TAG} -t ${IMAGE_LATEST} .
          docker push ${IMAGE_TAG}
          docker push ${IMAGE_LATEST}
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 60 \
            --port 80 \
            --set-env-vars "VITE_API_URL=${{ secrets.BACKEND_URL }}/api"
