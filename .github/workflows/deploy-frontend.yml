name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  SERVICE_NAME: asktennis-frontend
  ARTIFACT_REGISTRY_REPO: asktennis

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        working-directory: ./frontend
        run: |
          # BACKEND_URL must be set in repo secrets (e.g. https://asktennis-backend-xxx-uc.a.run.app) so the frontend bundle points to the correct API.
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}"
          IMAGE_TAG="${IMAGE_NAME}:${{ github.sha }}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"

          docker build \
            --build-arg VITE_API_URL=${{ secrets.BACKEND_URL }}/api \
            --build-arg VITE_API_KEY=${{ secrets.API_SECRET_KEY }} \
            -t ${IMAGE_TAG} -t ${IMAGE_LATEST} .
          docker push ${IMAGE_TAG}
          docker push ${IMAGE_LATEST}

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE_TAG \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 60 \
            --port 80 \
            --set-env-vars "VITE_API_URL=${{ secrets.BACKEND_URL }}/api"

      - name: Get Service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "Frontend deployed to: ${SERVICE_URL}"
          echo "FRONTEND_URL=${SERVICE_URL}" >> $GITHUB_ENV

      - name: Verify Deployment
        run: |
          echo "Waiting for service to be ready..."
          sleep 10
          curl -f $FRONTEND_URL || echo "Health check failed, but deployment completed"

      - name: Update Backend CORS
        run: |
          echo "⚠️ IMPORTANT: Update backend ALLOWED_ORIGINS to include: $FRONTEND_URL"
          echo "You may need to redeploy the backend with updated CORS settings"
