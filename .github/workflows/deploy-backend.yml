name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  SERVICE_NAME: asktennis-backend
  ARTIFACT_REGISTRY_REPO: asktennis

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    
    # Require CI to pass before deploying
    needs: []
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
      
      - name: Build and Push Docker Image
        working-directory: ./backend
        run: |
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}"
          IMAGE_TAG="${IMAGE_NAME}:${{ github.sha }}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"
          
          docker build -t ${IMAGE_TAG} -t ${IMAGE_LATEST} .
          docker push ${IMAGE_TAG}
          docker push ${IMAGE_LATEST}
          
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --cpu 2 \
            --memory 2Gi \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --port 8000 \
            --set-env-vars "ENVIRONMENT=production" \
            --set-env-vars "DB_TYPE=cloudsql" \
            --set-env-vars "INSTANCE_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --set-env-vars "DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars "DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars "RATE_LIMIT_PER_MINUTE=30" \
            --set-env-vars "QUERY_RATE_LIMIT_PER_MINUTE=10" \
            --set-secrets "GOOGLE_API_KEY=GOOGLE_API_KEY:latest" \
            --set-secrets "API_SECRET_KEY=API_SECRET_KEY:latest" \
            --set-secrets "DB_PASSWORD=DB_PASSWORD:latest" \
            --add-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      
      - name: Get Service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "Backend deployed to: ${SERVICE_URL}"
          echo "BACKEND_URL=${SERVICE_URL}" >> $GITHUB_ENV
      
      - name: Verify Deployment
        run: |
          echo "Waiting for service to be ready..."
          sleep 10
          curl -f ${{ env.BACKEND_URL }}/health || echo "Health check failed, but deployment completed"
